<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conversor de Moedas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>

  <div class="wrapper">
    <header class="header">
      <div class="logo-container">
        <svg class="header-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="m16 3 4 4-4 4"/>
          <path d="M20 7H9"/>
          <path d="m8 21-4-4 4-4"/>
          <path d="M4 17h11"/>
        </svg>
        <span class="logo-text">CONVERT</span>
      </div>
    </header>

    <main class="card">
      <div class="input-group">
        <label for="valor">VALOR</label>
        <input type="number" id="valor" step="0.01" placeholder="0,00">
      </div>

      <div class="input-group">
        <label for="moeda">MOEDA</label>
        <div class="select-wrapper">
          <select id="moeda">
            <option value="" disabled selected>Selecione a moeda</option>
            <option value="USD">Dólar Americano</option> 
            <option value="EUR">Euro</option>
            <option value="GBP">Libra Esterlina</option>
          </select>
          <svg class="select-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="m6 9 6 6 6-6"/>
          </svg>
        </div>
      </div>

      <button id="converter">Converter em reais</button>

      <div id="resultado-container" class="resultado-container">
        <p id="resultado"></p>
      </div>
    </main>
  </div>

  <div class="waves-container">
    <svg viewBox="0 0 1440 320" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="wave1" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#0f1445" stop-opacity="0.8" />
          <stop offset="100%" stop-color="#020205" stop-opacity="1" />
        </linearGradient>
        <linearGradient id="wave2" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#0b0e30" stop-opacity="0.9" />
          <stop offset="100%" stop-color="#020205" stop-opacity="1" />
        </linearGradient>
        <linearGradient id="wave3" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#070921" stop-opacity="0.7" />
          <stop offset="100%" stop-color="#020205" stop-opacity="1" />
        </linearGradient>
      </defs>
      <path d="M0,320 L0,320 Q200,260 400,320 Q700,210 950,320 Q1200,180 1440,320 L1440,320 Z" fill="url(#wave3)"></path>
      <path d="M0,320 L0,320 Q180,240 380,320 Q650,220 900,320 Q1180,160 1440,320 L1440,320 Z" fill="url(#wave2)"></path>
      <path d="M0,320 L0,320 Q150,290 300,320 Q480,240 650,320 Q900,200 1150,320 Q1300,140 1440,320 L1440,320 Z" fill="url(#wave1)"></path>
    </svg>
  </div>

</body>
</html>
